# Cấu hình finetune QLoRA tối giản cho Qwen3.
model:
  base_model: Qwen/Qwen3-0.6B
  trust_remote_code: true
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: float16
  device_map: auto

data:
  train_sources:
    - type: huggingface
      name: coung21/vi-spelling-correction
      split: train[:90%]
      domain: generic
      source_type: synthetic
    - type: huggingface
      name: coung21/vi-spelling-correction
      split: test[:10%]
      domain: generic
      source_type: synthetic
  eval_sources:
    - type: huggingface
      name: coung21/vi-spelling-correction
      split: test[:2%]
      domain: generic
      source_type: synthetic
  max_train_samples: null
  max_eval_samples: 1000
  seed: 42

prompt:
  system_prompt: |
    Bạn là bộ sửa lỗi chính tả tiếng Việt.
    Chỉ trả về câu đã sửa.
    Giữ nguyên ý nghĩa.
    Nếu câu đã đúng thì trả về nguyên văn.
    Không giải thích.

train:
  output_dir: outputs/qwen3-0.6b-spell-lora
  max_length: 512
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 32
  num_train_epochs: 3
  learning_rate: 1.0e-4
  warmup_steps: 100
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 200
  save_steps: 200
  save_total_limit: 2
  lr_scheduler_type: cosine
  gradient_checkpointing: true
  bf16: false
  fp16: true
  seed: 42

lora:
  r: 16
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

wandb:
  enabled: true
  project: qwen3-spelling-error-correction
  entity: null
  run_name: qwen3-0.6b-coung21-stage1
