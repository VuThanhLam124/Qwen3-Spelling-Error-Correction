lora:
    value:
        alpha: 16
        dropout: 0.05
        r: 8
        target_modules:
            - q_proj
            - k_proj
            - v_proj
            - o_proj
            - gate_proj
            - up_proj
            - down_proj
model:
    value:
        base_model: Qwen/Qwen3-0.6B
        bnb_4bit_compute_dtype: float16
        bnb_4bit_quant_type: nf4
        device_map: auto
        load_in_4bit: true
        trust_remote_code: true
prompt:
    value:
        system_prompt: |
            Bạn là bộ sửa lỗi chính tả tiếng Việt.
            Chỉ trả về câu đã sửa.
            Giữ nguyên ý nghĩa.
            Nếu câu đã đúng thì trả về nguyên văn.
            Không giải thích.
train:
    value:
        bf16: false
        eval_steps: 200
        fp16: true
        gradient_accumulation_steps: 16
        gradient_checkpointing: true
        learning_rate: 0.0001
        logging_steps: 10
        lr_scheduler_type: cosine
        max_length: 192
        num_train_epochs: 2
        output_dir: outputs/qwen3-0.6b-spell-lora
        per_device_eval_batch_size: 1
        per_device_train_batch_size: 1
        save_steps: 200
        save_total_limit: 2
        seed: 42
        warmup_ratio: 0.03
        weight_decay: 0.01
